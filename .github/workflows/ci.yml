name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # runtime libraries PyQt5 needs even on the offscreen platform
      - name: Install Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Run test suite
        run: make test
        env:
          QT_QPA_PLATFORM: offscreen
